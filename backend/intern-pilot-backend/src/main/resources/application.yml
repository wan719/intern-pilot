server:
  port: 8080

spring:
  application:
    name: intern-pilot-backend

  profiles:
    active: dev

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.internpilot.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true

ai:
  provider: ${AI_PROVIDER:deepseek}
  base-url: ${AI_BASE_URL:https://api.deepseek.com}
  api-key: ${DEEPSEEK_API_KEY:}
  model: ${AI_MODEL:deepseek-v4-flash}
  pro-model: ${AI_PRO_MODEL:deepseek-v4-pro}
  timeout-seconds: ${AI_TIMEOUT_SECONDS:60}
